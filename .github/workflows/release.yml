name: Release

on:
  push:
    tags:
      - 'v*'

# Serialize all release runs. Tags rarely arrive back-to-back, but when they
# do, two parallel publish jobs would race on npm and one would fail with
# "cannot publish over previously published version". The group key is
# workflow-scoped (not ref-scoped) so different tags share a single queue --
# a ref-scoped key would put each tag in its own group of one and not
# serialize at all. cancel-in-progress is false so a queued run waits its
# turn instead of being killed: losing a tag's release event is worse than
# waiting a minute.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  integration:
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  release:
    needs: integration
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-publish smoke test: the release is live on npm, so we confirm that
      # a fresh install via npx can execute the binary and respond to --version.
      # Catches packaging regressions (missing bin shebang, bad "files" entry,
      # broken esbuild output) before they hit real users.
      - name: Smoke test published package
        # Run npx from a temp dir — if run from the checkout root, npx sees our
        # own package.json `bin` entry and tries to resolve the local (unbuilt)
        # path instead of installing the published tarball.
        working-directory: ${{ runner.temp }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Registry propagation can lag a few seconds after publish succeeds.
          for i in 1 2 3 4 5; do
            if npm view "@yawlabs/tailscale-mcp@${VERSION}" version >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for @yawlabs/tailscale-mcp@${VERSION} to appear on the registry (attempt $i)..."
            sleep 5
          done
          OUTPUT=$(npx -y "@yawlabs/tailscale-mcp@${VERSION}" --version)
          echo "npx output: $OUTPUT"
          if [ "$OUTPUT" != "$VERSION" ]; then
            echo "Expected $VERSION, got $OUTPUT" >&2
            exit 1
          fi
