name: Release

on:
  push:
    tags:
      - 'v*'

# Serialize all release runs. Tags rarely arrive back-to-back, but when they
# do, two parallel publish jobs would race on npm and one would fail with
# "cannot publish over previously published version". The group key is a
# hardcoded literal (not `${{ github.workflow }}` or `release-${{ github.ref }}`)
# so different tags share a single queue and a future rename of the workflow
# `name:` field can't silently fragment the queue across the rename window.
# cancel-in-progress is false so a queued run waits its turn instead of being
# killed: losing a tag's release event is worse than waiting a minute.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  integration:
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  release:
    needs: integration
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-publish smoke test: the release is live on npm, so we confirm that
      # a fresh install via npx can execute the binary and respond to --version.
      # Catches packaging regressions (missing bin shebang, bad "files" entry,
      # broken esbuild output) before they hit real users.
      - name: Smoke test published package
        # Run npx from a temp dir — if run from the checkout root, npx sees our
        # own package.json `bin` entry and tries to resolve the local (unbuilt)
        # path instead of installing the published tarball.
        working-directory: ${{ runner.temp }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Registry propagation can lag well past a minute after publish
          # succeeds, and `npm view` and `npx` may hit different CDN paths --
          # v0.10.8 false-failed because we gated on `npm view` (which cleared)
          # but `npx -y` was still ETARGET'ing on a stale mirror, and v0.10.9
          # false-failed under a 10*5s = 50s budget that didn't outlast the
          # CDN warm-up. Retry the actual smoke (the npx invocation itself)
          # with a budget generous enough to outlast realistic propagation.
          # 30 * 10s = ~5min upper bound; typical case completes in < 30s.
          ATTEMPTS=30
          SLEEP_SECONDS=10
          OUTPUT=""
          STARTED_AT=$(date +%s)
          for i in $(seq 1 $ATTEMPTS); do
            if OUTPUT=$(npx -y "@yawlabs/tailscale-mcp@${VERSION}" --version 2>/dev/null); then
              echo "npx output: $OUTPUT (after $(( $(date +%s) - STARTED_AT ))s)"
              break
            fi
            echo "Waiting for @yawlabs/tailscale-mcp@${VERSION} to be installable via npx (attempt $i/$ATTEMPTS, ${SLEEP_SECONDS}s)..."
            sleep $SLEEP_SECONDS
          done
          if [ "$OUTPUT" != "$VERSION" ]; then
            echo "Expected $VERSION, got '$OUTPUT' after $ATTEMPTS attempts ($(( $(date +%s) - STARTED_AT ))s)" >&2
            exit 1
          fi
