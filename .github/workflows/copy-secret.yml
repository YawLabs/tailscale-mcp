name: Copy NPM_TOKEN to npmjs-mcp
on: workflow_dispatch
jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: echo "$NPM_TOKEN" | gh secret set NPM_TOKEN --repo YawLabs/npmjs-mcp
