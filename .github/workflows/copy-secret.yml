name: Copy Secret
on: workflow_dispatch
jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy NPM_TOKEN to lemonsqueezy-mcp
        run: echo "$NPM_TOKEN" | gh secret set NPM_TOKEN --repo YawLabs/lemonsqueezy-mcp
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
