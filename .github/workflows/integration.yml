name: Integration Tests

# Runs the live-tailnet integration test suite (src/integration.test.ts).
# Triggers:
#   - schedule: nightly at 06:17 UTC
#   - workflow_call: invoked by release.yml on every tag push, gating publish
#   - workflow_dispatch: manual trigger
# Requires the TAILSCALE_TEST_API_KEY repository secret (and optionally
# TAILSCALE_TEST_TAILNET) to be configured under:
#   Settings > Secrets and variables > Actions.
# Read-only against whatever tailnet the key is scoped to; no mutations.

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_call:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify integration secret is configured
        env:
          API_KEY: ${{ secrets.TAILSCALE_TEST_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::TAILSCALE_TEST_API_KEY repository secret is not configured. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - run: npm ci

      - name: Run integration tests against live tailnet
        env:
          RUN_INTEGRATION_TESTS: "1"
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_TEST_API_KEY }}
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TEST_TAILNET }}
        run: npm test
