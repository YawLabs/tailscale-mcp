name: Integration Tests

# Runs the live-tailnet integration test suite (src/integration.test.ts).
# Triggers:
#   - schedule: nightly at 06:17 UTC
#   - workflow_call: invoked by release.yml on every tag push, gating publish
#   - workflow_dispatch: manual trigger
# Requires the TAILSCALE_TEST_API_KEY repository secret (and optionally
# TAILSCALE_TEST_TAILNET) to be configured under:
#   Settings > Secrets and variables > Actions.
# Read-only against whatever tailnet the key is scoped to; no mutations.

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_call:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check for integration secret
        id: check
        env:
          API_KEY: ${{ secrets.TAILSCALE_TEST_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::notice::TAILSCALE_TEST_API_KEY not configured — skipping integration tests. Forks and repos without a test tailnet are expected to hit this path. To run live tests, add the secret under Settings > Secrets and variables > Actions."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.configured == 'true'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.check.outputs.configured == 'true'

      - name: Run integration tests against live tailnet
        if: steps.check.outputs.configured == 'true'
        env:
          RUN_INTEGRATION_TESTS: "1"
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_TEST_API_KEY }}
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TEST_TAILNET }}
        run: npm test
